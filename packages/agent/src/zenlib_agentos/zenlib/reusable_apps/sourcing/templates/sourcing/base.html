<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% block head %}{% endblock %}
  <title>{% block title %}Jill — Sourcing{% endblock %}</title>
  <style>
    :root{
      --cream:#f7f5ef; --paper:#fff; --ink:#1f2430; --muted:#857f72;
      --line:#eae6dc; --accent:#e0703c; --accent-700:#c75e2e;
      --accent-soft:#fbeae0; --gold:#f1c64b;
      --met:#2e9e5b; --met-bg:#e7f5ec; --partial:#b8801f; --partial-bg:#fbf2e0;
      --missed:#9a958a; --missed-bg:#f0eee8;
      --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
      --sans:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;font:15px/1.5 var(--sans);color:var(--ink);background:var(--cream)}
    a{color:var(--accent-700);text-decoration:none} a:hover{text-decoration:underline}
    .app{display:flex;min-height:100vh}

    /* sidebar */
    .sidebar{width:236px;flex:none;background:var(--paper);border-right:1px solid var(--line);
             display:flex;flex-direction:column;padding:18px 14px}
    .brand{display:flex;align-items:center;gap:9px;padding:6px 8px 16px;font-family:var(--serif);
           font-size:21px;font-weight:600;letter-spacing:.2px}
    .brand .spark{width:26px;height:26px;border-radius:8px;background:#15171c;color:var(--gold);
                  display:grid;place-items:center;font-size:15px}
    .brand b{color:var(--accent)}
    .nav a{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;
           color:var(--ink);font-weight:500;margin-bottom:2px}
    .nav a:hover{background:var(--cream);text-decoration:none}
    .nav a.active{background:var(--accent-soft);color:var(--accent-700)}
    .nav .ic{width:18px;text-align:center;opacity:.8}
    .side-spacer{flex:1}
    .who{display:flex;align-items:center;gap:10px;padding:10px;border-top:1px solid var(--line)}
    .who .av{width:30px;height:30px;border-radius:8px;background:#2f6f57;color:#fff;
             display:grid;place-items:center;font-weight:700;font-size:13px}
    .who small{color:var(--muted)}

    /* main */
    .content{flex:1;min-width:0;padding:30px 40px;max-width:1040px}
    h1{font-family:var(--serif);font-size:26px;font-weight:600;margin:0 0 4px}
    .sub{color:var(--muted);margin:0 0 24px}
    h3{font-size:14px;font-weight:600;letter-spacing:.02em;color:var(--ink);
       margin:26px 0 10px;display:flex;align-items:center;gap:10px}

    .card{background:var(--paper);border:1px solid var(--line);border-radius:16px;
          padding:18px 20px;margin-bottom:12px;box-shadow:0 1px 2px rgba(30,30,20,.03)}
    .row{display:flex;align-items:center;gap:16px}
    .muted{color:var(--muted)}

    /* score badge */
    .score{width:52px;height:52px;flex:none;border-radius:14px;display:grid;place-items:center;
           font-weight:700;font-size:19px;font-variant-numeric:tabular-nums;
           background:var(--missed-bg);color:var(--missed)}
    .score.fit{background:var(--met-bg);color:var(--met)}
    .name{font-weight:650;font-size:16px}
    .verdict.fit{color:var(--met);font-weight:600}.verdict.drop{color:var(--missed)}

    /* chips */
    .chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 11px;
          font-size:12.5px;margin:3px 5px 0 0;background:var(--cream);border:1px solid var(--line)}
    .chip.met{background:var(--met-bg);border-color:#cfe9d8;color:#1d7a45}
    .chip.partial{background:var(--partial-bg);border-color:#f0e0b8;color:#946615}
    .chip.missed{background:var(--missed-bg);border-color:#e6e2d8;color:#7c776c}
    .chip.prov{background:#eef2fb;border-color:#dde6f7;color:#39507f}
    .chip.net{background:#f3eefc;border-color:#e6dcf6;color:#6a4aa0}
    .summary{margin-top:9px;font-size:14px}

    /* table */
    table{width:100%;border-collapse:collapse}
    td,th{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
    th{color:var(--muted);font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.04em}
    .pill{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--cream);border:1px solid var(--line)}
    .pill.draft{background:var(--partial-bg)} .pill.approved{background:var(--met-bg);color:#1d7a45}
    .pill.sent{background:#eef2fb} .pill.rejected{background:#f7ebe6;color:#a23}
    .pill.pending{background:var(--partial-bg)} .pill.running{background:#eef2fb;color:#2a5bd7}
    .pill.completed{background:var(--met-bg);color:#1d7a45} .pill.budget_exhausted{background:var(--accent-soft);color:var(--accent-700)}
    .pill.failed{background:#f7ebe6;color:#a23}
    .counters{font-variant-numeric:tabular-nums;color:var(--muted)}

    button,.btn{font:inherit;border:1px solid var(--line);background:var(--paper);border-radius:10px;
                padding:6px 13px;cursor:pointer;font-weight:500}
    button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    button.primary:hover{background:var(--accent-700)}
    form.inline{display:inline}
    .live{font-size:12px;color:var(--muted);font-weight:400}
    .live .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#2a5bd7;
               margin-right:6px;animation:pulse 1.2s infinite}
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

    /* page header + KPI tiles */
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
    .tiles{display:flex;gap:12px;flex-wrap:wrap;margin:0 0 22px}
    .tile{flex:1;min-width:124px;margin:0;padding:14px 16px}
    .tile .l{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
             font-weight:600}
    .tile .n{font-family:var(--serif);font-size:27px;line-height:1.1;margin-top:3px;
             font-variant-numeric:tabular-nums}
    .tile .n.accent{color:var(--accent-700)} .tile .n.good{color:var(--met)}

    /* labels, meta, evidence */
    .lab{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600}
    .metaline{color:var(--muted);font-size:13.5px}
    .headline{color:var(--muted);font-size:13px;font-style:italic;margin-top:3px}
    .reasons{margin:9px 0 0;padding:0;list-style:none;color:#5d5848;font-size:12.5px}
    .reasons li{position:relative;padding-left:16px;margin:2px 0}
    .reasons li:before{content:"›";position:absolute;left:3px;color:var(--accent);font-weight:700}
    .dropline{margin-top:9px;font-size:13px;color:#9a6a55}
    .kv{display:grid;grid-template-columns:120px 1fr;gap:8px 14px;align-items:start}
    .kv .lab{padding-top:3px}
    .empty{color:var(--muted);text-align:center;padding:30px 10px}
    .when{color:var(--muted);font-size:12.5px;white-space:nowrap}
    a.plain,a.plain:hover{color:var(--ink);text-decoration:none}

    /* search brief — 3 columns: monitoring / must-have / scoring rubric */
    .brief{display:grid;grid-template-columns:1.25fr .7fr 1.45fr;gap:0}
    .brief > div{padding:2px 22px;border-left:1px solid var(--line);min-width:0}
    .brief > div:first-child{padding-left:2px;border-left:none}
    .brief-h{display:flex;align-items:center;gap:7px;font-size:11px;text-transform:uppercase;
             letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:10px}
    .brief-h .ic{font-size:13px}
    .chip.seed{background:var(--accent-soft);border-color:#f0d5c4;color:var(--accent-700);font-weight:600}
    .chip .dep{color:var(--muted);font-size:11px;margin-left:2px}
    .chip.key{border-color:#e3cabd;font-weight:600}
    .wt{display:inline-grid;place-items:center;min-width:17px;height:17px;border-radius:50%;
        background:#cfc8b8;color:#fff;font-size:10.5px;font-weight:700;margin-left:5px}
    .chip.key .wt{background:var(--accent)}
    @media(max-width:820px){
      .brief{grid-template-columns:1fr}
      .brief > div{border-left:none;border-top:1px solid var(--line);padding:10px 0}
      .brief > div:first-child{border-top:none}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><span class="spark">✳</span> <span>Jack<b>&amp;</b>Jill</span></div>
      <nav class="nav">
        <a class="{% if nav == 'roles' %}active{% endif %}" href="/ui/sourcing/{% if tenant %}?tenant={{ tenant.id }}{% endif %}">
          <span class="ic">🗂️</span> Roles</a>
        <a class="{% if nav == 'outreach' %}active{% endif %}" href="/ui/sourcing/outreach/{% if tenant %}?tenant={{ tenant.id }}{% endif %}">
          <span class="ic">✉️</span> Outreach</a>
      </nav>
      <div class="side-spacer"></div>
      {% if tenant %}
        <div class="who"><span class="av">{{ tenant.name|slice:":1" }}</span>
          <div><div style="font-weight:600">{{ tenant.name }}</div><small>Jill · recruiter</small></div>
        </div>
      {% endif %}
    </aside>
    <main class="content">{% block body %}{% endblock %}</main>
  </div>
</body>
</html>
