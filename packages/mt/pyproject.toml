[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "zenlib-mt-py"
version = "0.1.0"
description = "Multitenant base classes, RLS plumbing, shared Django utils."
requires-python = ">=3.12,<3.14"
dependencies = [
    "django>=5.2,<5.3",
]

[tool.hatch.build.targets.wheel]
packages = ["src/zenlib"]
