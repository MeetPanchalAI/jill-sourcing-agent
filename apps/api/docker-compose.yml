services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: zenapi
      POSTGRES_USER: zen
      POSTGRES_PASSWORD: zen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zen -d zenapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: {}
